<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Korepetycje</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="layout">

    <div class="main">
        <h1>Korepetycje z matematyki</h1>

        <div class="section">
            <h2>O mnie</h2>
            <p>Pomagam uczniom zrozumieć matematykę w prosty sposób.</p>
        </div>

        <div class="section">
            <h2>Oferta</h2>
            <ul>
                <li>Szkoła podstawowa</li>
                <li>Liceum</li>
                <li>Przygotowanie do matury</li>
            </ul>
        </div>

        <div class="section">
            <h2>Kontakt</h2>
            <p>Email: kontakt@mail.com</p>
            <div class="contact-box">
                Napisz
            </div>
        </div>
    </div>

    <div class="sidebar">

        <div class="panel link-panel" id="profileBox">
            <h3>Profil</h3>
            <p id="profileName">Gość</p>

            <div id="profileActions" style="display: none;">
                <button id="loginBtn" onclick="goToLogin()">Zaloguj</button>
                <button id="registerBtn" onclick="goToRegister()">Zarejestruj</button>
                <button id="logoutBtn" onclick="logout()" style="display: none;">Wyloguj</button>
            </div>
        </div>

        <div class="panel">
            <h3>Data i godzina</h3>
            <p id="datetime"></p>
        </div>

        <div class="panel">
            <h3>Najbliższe lekcje</h3>
            <ul>
                <li>Poniedziałek 16:00</li>
                <li>Środa 18:00</li>
            </ul>
        </div>

    </div>

</div>

<script>
function updateDateTime() {
    const now = new Date();
    const date = now.toLocaleDateString('pl-PL');
    const time = now.toLocaleTimeString('pl-PL');
    document.getElementById("datetime").innerText = date + " " + time;
}

setInterval(updateDateTime, 1000);
updateDateTime();

const profileBox = document.getElementById("profileBox");
const profileActions = document.getElementById("profileActions");

console.log("profileBox:", profileBox);
console.log("profileActions:", profileActions);

profileBox.addEventListener("mouseenter", () => {
    console.log("ENTER");
    profileActions.style.display = "block";
});

profileBox.addEventListener("mouseleave", () => {
    console.log("LEAVE");
    profileActions.style.display = "none";
});

const user = JSON.parse(localStorage.getItem("user"));

const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");
const logoutBtn = document.getElementById("logoutBtn");
const nameEl = document.getElementById("profileName");

if (user) {
    nameEl.innerText = user.name;

    loginBtn.style.display = "none";
    registerBtn.style.display = "none";
    logoutBtn.style.display = "block";

} else {
    nameEl.innerText = "Gość";

    loginBtn.style.display = "block";
    registerBtn.style.display = "block";
    logoutBtn.style.display = "none";
}

function goToLogin() {
    window.location.href = "pages/login.html";
}

function goToRegister() {
    window.location.href = "pages/register.html";
}

function logout() {
    alert("klik działa");
    localStorage.removeItem("user");
    location.reload();
}
</script>

</body>
</html>
